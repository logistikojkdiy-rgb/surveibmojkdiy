<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Survei Kepuasan Layanan BM - OJK DIY</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/logojkdiy/Layanan%20Terintegrasi%20-%20OJK%20DIY.png?updatedAt=1758676242385">
    
    <!-- Open Graph & Meta Tags -->
    <meta name="title" content="Survei Kepuasan Layanan BM - OJK DIY">
    <meta name="description" content="Survei Kepuasan Layanan khusus unit Building Management di lingkungan Otoritas Jasa Keuangan (OJK) DIY.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Survei Kepuasan Layanan BM - OJK DIY">
    <meta property="og:description" content="Survei Kepuasan Layanan khusus unit Building Management di lingkungan Otoritas Jasa Keuangan (OJK) DIY.">
    <meta property="og:image" content="https://ik.imagekit.io/logojkdiy/ojk-indonesia-seeklogo.png?updatedAt=1754402028771">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'ojk-red': '#DA251D',
                        'ojk-dark': '#1F2937',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'progress-bar': 'progressFill 4.5s cubic-bezier(0.65, 0, 0.35, 1) forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        progressFill: {
                            '0%': { width: '0%', opacity: '0.5' },
                            '15%': { width: '30%', opacity: '1' },
                            '70%': { width: '85%' },
                            '100%': { width: '100%' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* CSS Architecture: Lock Scroll */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #F8FAFC;
        }
        
        /* Dynamic Viewport Support */
        .h-dvh {
            height: 100vh;
            height: 100dvh; 
        }

        .bg-glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="relative h-dvh w-full font-sans selection:bg-ojk-red selection:text-white">

    <!-- ========================================== -->
    <!-- LAYER 1: APP SHELL (iFRAME KOSONGAN)         -->
    <!-- ========================================== -->
    <!-- Opacity-0 agar iframe disembunyikan saat splashscreen berjalan -->
    <main id="app-layer" class="absolute inset-0 w-full h-full z-10 opacity-0 pointer-events-none transition-opacity duration-1000 ease-in-out bg-white">
        
        <!-- Loading Fallback if iFrame is slow -->
        <div class="absolute inset-0 flex items-center justify-center bg-white -z-10">
            <svg class="animate-spin h-8 w-8 text-ojk-red/30" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </div>

        <!-- Integrasi Link GAS -->
        <iframe 
            id="survey-frame"
            src="https://script.google.com/macros/s/AKfycbw_X5naE1tAj7UVtV5pwB0NR7zaEL49p8bL_lAS-JhQC_18p1NRTRNuysf_9aCFsbHPNg/exec" 
            class="w-full h-full border-none bg-transparent"
            title="Formulir Survei Kepuasan Layanan BM OJK DIY"
            allowfullscreen>
        </iframe>
    </main>


    <!-- ========================================== -->
    <!-- LAYER 2: SPLIT-CARD SPLASH SCREEN          -->
    <!-- ========================================== -->
    <div id="splash-layer" class="absolute inset-0 w-full h-full z-50 bg-gray-100/50 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6 transition-opacity duration-1000 ease-in-out">
        
        <!-- Cangkang Split Card -->
        <div class="w-full max-w-4xl h-[85vh] sm:h-[600px] bg-white rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col md:flex-row opacity-0 animate-fade-in-up border border-gray-100">
            
            <!-- SEGMEN KIRI: Video Cover (Jogja Istimewa) -->
            <div class="relative w-full h-2/5 md:h-full md:w-1/2 bg-gray-900 overflow-hidden flex-shrink-0">
                <!-- Video Element -->
                <video 
                    src="https://ik.imagekit.io/logojkdiy/JOGJA%20ISTIMEWA.mp4?updatedAt=1763092078008" 
                    autoplay loop muted playsinline 
                    class="absolute inset-0 w-full h-full object-cover">
                </video>
                <!-- Subtle Gradient Overlay to ensure text readability if added later, and to add depth -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
            </div>

            <!-- SEGMEN KANAN: Identitas & Loading Progress -->
            <div class="w-full h-3/5 md:h-full md:w-1/2 flex flex-col items-center justify-center p-8 sm:p-12 text-center bg-white relative">
                
                <!-- Decorative subtle blur at background -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-ojk-red/5 rounded-full blur-3xl animate-pulse-slow"></div>

                <!-- Konten Utama -->
                <div class="relative z-10 flex flex-col items-center w-full">
                    <!-- Logo Section -->
                    <div class="w-32 h-32 sm:w-40 sm:h-40 mb-6 flex items-center justify-center">
                        <img 
                            src="https://ik.imagekit.io/logojkdiy/ojk-indonesia-seeklogo.png?updatedAt=1754402028771" 
                            alt="Logo OJK" 
                            class="w-full h-auto object-contain drop-shadow-sm"
                        />
                    </div>

                    <!-- Typography Section -->
                    <div class="space-y-1.5 mb-12">
                        <h1 class="text-xl sm:text-2xl font-bold text-ojk-dark tracking-tight leading-snug">
                            Survei Kepuasan Layanan
                        </h1>
                        <h2 class="text-base sm:text-lg font-semibold text-ojk-red">
                            Building Management
                        </h2>
                        <div class="pt-4">
                            <p class="text-[10px] sm:text-xs font-semibold text-gray-400 uppercase tracking-[0.25em]">
                                Otoritas Jasa Keuangan DIY
                            </p>
                        </div>
                    </div>

                    <!-- Loading Indicator -->
                    <div class="w-full max-w-[260px]">
                        <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                            <!-- Progress Bar (Animasi di-set ke 4.5 detik) -->
                            <div class="h-full bg-gradient-to-r from-red-500 to-ojk-red rounded-full animate-progress-bar"></div>
                        </div>
                        <p id="loading-text" class="mt-4 text-xs font-medium text-gray-500 tracking-wide transition-opacity duration-300">
                            Menyiapkan ruang kerja digital...
                        </p>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- ========================================== -->
    <!-- APPLICATION LOGIC (SPA TRANSITION)         -->
    <!-- ========================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Durasi Splashscreen di-set sedikit lebih lama (4.5 detik) 
            // agar pengguna sempat menikmati video Jogja Istimewa
            const SPLASH_DURATION = 4500; 
            
            const splashLayer = document.getElementById('splash-layer');
            const appLayer = document.getElementById('app-layer');
            const loadingText = document.getElementById('loading-text');

            // Dynamic text feedback untuk ilusi proses backend
            setTimeout(() => {
                loadingText.style.opacity = 0;
                setTimeout(() => {
                    loadingText.textContent = "Memuat modul survei...";
                    loadingText.style.opacity = 1;
                }, 300);
            }, 2000);

            // Eksekusi Transisi Menuju Frame
            setTimeout(() => {
                // 1. Munculkan iFrame (hilangkan opacity 0)
                appLayer.classList.remove('opacity-0', 'pointer-events-none');
                
                // 2. Pudarkan layar Splash Screen
                splashLayer.classList.add('opacity-0', 'scale-105'); // scale-105 memberi efek zoom out dramatis
                
                // 3. Garbage Collection: Hapus elemen splash dan video dari memory setelah transisi CSS selesai (1 detik)
                setTimeout(() => {
                    splashLayer.remove();
                    console.log("[Arsitektur UI] Splash screen dan Video dinonaktifkan untuk menghemat RAM.");
                }, 1000);

            }, SPLASH_DURATION);
        });
    </script>
</body>
</html>
