<body class="bg-elegant-gradient min-h-screen flex items-center justify-center overflow-hidden selection:bg-ojk-red selection:text-white">

        <!-- Loading Indicator Section -->
        <div class="w-full max-w-[240px]" role="progressbar" aria-label="Memuat aplikasi survei" aria-valuemin="0" aria-valuemax="100">
            <div class="h-1 w-full bg-gray-200 rounded-full overflow-hidden">

            </div>
            <p id="loading-text" class="mt-4 text-xs font-medium text-gray-400 tracking-wide transition-opacity duration-300">
                Menyiapkan sistem...
            </p>
        </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            /**
             * ⚠️ PERHATIAN: Masukkan FULL URL Web App GAS Anda di sini
             * Berdasarkan screenshot Anda, URL dimulai dengan AKfycbxrgWG2RAEfGNQ4...
             */
            const GAS_EXEC_URL = "https://script.google.com/macros/s/AKfycbw_cIV8PkVUnQ_UiJISPwxqaGjusYjQwJUq7n51WuCsE-UxG74ss85AG1_VKnCB4Xd6rQ/exec"; // <-- GANTI DENGAN URL EXEC YANG LENGKAP
            
            const LOADING_DURATION = 3000; 
            const loadingText = document.getElementById('loading-text');
            
            // Dynamic loading text
            setTimeout(() => {
                loadingText.style.opacity = 0;
                setTimeout(() => {
                    loadingText.textContent = "Mengalihkan ke formulir...";
                    loadingText.style.opacity = 1;
                }, 300);
            }, 1500);

            // Eksekusi Redirect setelah animasi selesai
            setTimeout(() => {
                loadingText.style.opacity = 0;
                setTimeout(() => {
                    loadingText.textContent = "Membuka halaman...";
                    loadingText.style.opacity = 1;
                    loadingText.classList.replace('text-gray-400', 'text-ojk-red');
                }, 300);
                
                console.log(`[Arsitektur GAS] Mengeksekusi redirect ke: ${GAS_EXEC_URL}`);
                
                // BARIS INI SUDAH DIAKTIFKAN. Pastikan GAS_EXEC_URL di atas sudah lengkap.
                window.location.href = GAS_EXEC_URL;
                
            }, LOADING_DURATION);
        });
    </script>
